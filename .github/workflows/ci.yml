name: CI

on:
  push:
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer ruff
        run: pip install ruff

      - name: Vérifier le style du code
        run: ruff check repo_depart/churnguard/ repo_depart/api/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer mypy
        run: pip install mypy pandas scikit-learn

      - name: Vérifier les types
        run: mypy repo_depart/churnguard/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install pandas scikit-learn mlflow fastapi uvicorn pydantic pytest pytest-cov

      - name: Installer le package
        working-directory: repo_depart
        run: pip install -e .

      - name: Lancer les tests
        working-directory: repo_depart
        run: pytest tests/ --cov=churnguard --cov-fail-under=70 -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Builder l'image Docker
        working-directory: repo_depart
        run: docker build -t churnguard-api .