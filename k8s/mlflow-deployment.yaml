apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.11-slim
          command: ["bash", "-c"]
          args:
            - "pip install mlflow -q && mlflow server --host 0.0.0.0 --port 5000
              --backend-store-uri sqlite:///mlflow.db
              --default-artifact-root /mlruns
              --serve-artifacts"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: mlruns
              mountPath: /mlruns
      volumes:
        - name: mlruns
          emptyDir: {}
