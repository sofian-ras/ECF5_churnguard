services:

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - mlflow_db:/app/db
    ports:
      - "5000:5000"
    command: bash -c "pip install mlflow -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////app/db/mlflow.db --default-artifact-root file:///app/mlruns --serve-artifacts --workers 1 --disable-security-middleware"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_healthy
    command: sh -c "python scripts/bootstrap_model.py && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mlflow_db:
