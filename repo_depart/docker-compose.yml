services:

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - mlflow_db:/app/db
    ports:
      - "5000:5000"
    command: bash -c "pip install mlflow==2.22.0 -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////app/db/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination file:///app/mlruns --serve-artifacts --workers 1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  bootstrap:
    build:
      context: .
      target: bootstrap
    volumes:
      - ./data:/app/data
      - mlflow_db:/app/db
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mlflow_db:
