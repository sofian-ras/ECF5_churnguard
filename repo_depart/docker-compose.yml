services:

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
      - mlflow_db:/app/db
    ports:
      - "5000:5000"
    command: bash -c "pip install mlflow -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////app/db/mlflow.db --default-artifact-root file:///app/mlruns --serve-artifacts --workers 1 --disable-security-middleware"

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mlflow_db:
